<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Frame Randomizer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #0f0f0f;
      color: white;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    #drop-zone {
      border: 3px dashed #666;
      padding: 40px;
      margin: 20px auto;
      border-radius: 12px;
      cursor: pointer;
    }
    #frames {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
      margin: 30px 0;
    }
    .frame {
      width: 100%;
      max-width: 650px;
      border: 2px solid #444;
      border-radius: 12px;
      overflow: hidden;
      background: #1a1a1a;
    }
    .frame img {
      width: 100%;
      display: block;
    }
    .frame p {
      padding: 10px;
      margin: 0;
      background: #222;
      font-size: 14px;
    }
    button {
      padding: 12px 24px;
      margin: 10px;
      font-size: 16px;
      background: #ff4d4d;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover { 
      background: #ff3333; 
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎥 Video Frame Randomizer</h1>
    <p>Upload a video → Get 5-6 random screenshots</p>

    <div id="drop-zone">
      <h2>Drop Video Here or Click to Upload</h2>
      <input type="file" id="video-upload" accept="video/*" style="display:none;">
    </div>

    <video id="video" style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <div id="status"></div>
    <button id="generate-btn" style="display:none;">Generate Random Frames</button>

    <div id="frames"></div>
    <button id="download-btn" style="display:none;">Download Collage</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
